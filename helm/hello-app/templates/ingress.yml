apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: globalpath
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hi-there
                port:
                  number: 80
